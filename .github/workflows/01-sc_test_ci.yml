name: Run Tests on PR Creation

on:
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge Build
        run: |
          forge --version
          forge clean
          forge build --skip .t.sol .s.sol
        id: forge-build  

      - name: Forge Test
        env:
          ARBITRUM_MAINNET_RPC_URL: ${{ secrets.ARBITRUM_MAINNET_RPC_URL}}
          AVALANCHE_MAINNET_RPC_URL: ${{ secrets.AVALANCHE_MAINNET_RPC_URL}}
          BASE_MAINNET_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL}}
          ETHEREUM_MAINNET_RPC_URL: ${{ secrets.ETHEREUM_MAINNET_RPC_URL}}
          OPTIMISM_MAINNET_RPC_URL: ${{ secrets.OPTIMISM_MAINNET_RPC_URL}}
          ARBITRUM_TESTNET_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_TESTNET_SEPOLIA_RPC_URL}}
          ETHEREUM_TESTNET_SEPOLIA_RPC_URL: ${{ secrets.ETHEREUM_TESTNET_SEPOLIA_RPC_URL}}
        run: |
          forge test --skip UniV3StratFuzzTest.t.sol UniV3StratTest.t.sol